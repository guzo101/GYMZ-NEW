workflows:
  ios-simulator-preview:
    name: iOS Simulator preview
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: 22.14.0
      xcode: latest
    scripts:
      - name: Install deps, prebuild, pods
        script: |
          set -e
          APP_DIR="$CM_BUILD_DIR/Gymz"
          test -d "$APP_DIR" || { echo "ERROR: Gymz/ not found"; exit 1; }
          cd "$APP_DIR"
          npm ci
          if [ ! -d ios ]; then
            npx expo prebuild --platform ios --no-install
          fi
          if [ ! -d ios ]; then
            echo "ERROR: ios/ missing after prebuild"
            exit 1
          fi
          cd ios
          pod install

      - name: Build unsigned simulator .app
        script: |
          set -e
          APP_DIR="$CM_BUILD_DIR/Gymz"
          DERIVED_DATA="$CM_BUILD_DIR/build"
          BUILD_OUTPUT="$DERIVED_DATA/Build/Products/Debug-iphonesimulator"

          WS_ABS=$(find "$APP_DIR/ios" -maxdepth 1 -name "*.xcworkspace" | head -1)
          test -n "$WS_ABS" || { echo "ERROR: no .xcworkspace found"; exit 1; }

          SCHEME="Gymz"

          echo "=== Build config ==="
          echo "Workspace : $WS_ABS"
          echo "Scheme    : $SCHEME"
          echo "DerivedData: $DERIVED_DATA"
          echo "===================="

          xcodebuild build \
            -workspace "$WS_ABS" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

          echo "=== .app files found ==="
          find "$DERIVED_DATA" -name "*.app" -type d
          echo "========================"

    artifacts:
      - $CM_BUILD_DIR/build/Build/Products/Debug-iphonesimulator/*.app
